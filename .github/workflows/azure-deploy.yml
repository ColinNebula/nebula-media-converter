name: Deploy to Azure App Service

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: nebula-media-converter-hadygqenh6dpe9c5
  AZURE_WEBAPP_PACKAGE_PATH: './build'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

    - name: Run tests
      run: npm test -- --passWithNoTests --watchAll=false || echo "Tests completed"
      continue-on-error: true
      env:
        CI: true

    - name: Build application
      run: npm run build
      env:
        CI: false
        NODE_ENV: production
        GENERATE_SOURCEMAP: false
        DEPLOY_TARGET: azure

    - name: Copy Azure configuration and server files
      run: |
        cp web.config build/web.config
        cp server.js build/server.js
        cp azure-package.json build/package.json
        echo "Files prepared for Azure deployment:"
        ls -la build/
        echo "Total files:"
        find build -type f | wc -l

    - namd build
        zip -r ../deployment.zip . -x "*.git*"ed"
        ls -la node_modules/ | head -20

    - name: Create deployment package
      run: |
        cp server.js build/
        cp azure-package.json build/package.json
        cd build
        npm install --production
        zip -r ../deployment.zip .
        cd ..
        echo "Deployment package created"
        ls -lh deployment.zip

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: deployment.zip

    - name: Upload deployment artifact (for debugging)
      uses: actions/upload-artifact@v4
      with:
        name: azure-deployment-package
        path: deployment.zip
        retention-days: 1

    - name: Deployment notification
      if: success()
      run: |
        echo "✅ Deployed successfully to Azure App Service!"
        echo "🌐 URL: https://nebula-media-converter-hadygqenh6dpe9c5.canadacentral-01.azurewebsites.net"

  health-check:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    
    steps:
    - name: Wait for deployment to propagate
      run: sleep 60

    - name: Health check
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" https://nebula-media-converter-hadygqenh6dpe9c5.canadacentral-01.azurewebsites.net)
        if [ $response -eq 200 ]; then
          echo "✅ Health check passed (HTTP $response)"
        else
          echo "⚠️ Health check returned HTTP $response"
          exit 1
        fi
