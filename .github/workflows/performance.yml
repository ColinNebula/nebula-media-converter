name: Performance Testing

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build app
      run: npm run build
      env:
        CI: false

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v11
      with:
        uploadArtifacts: true
        temporaryPublicStorage: true
        configPath: './.lighthouserc.json'

  bundle-size:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build and analyze bundle
      run: |
        npm run build
        npx vite-bundle-visualizer --template treemap --open=false
      env:
        CI: false

    - name: Check bundle size
      run: |
        BUILD_SIZE=$(du -sh build | cut -f1)
        echo "📦 Build size: $BUILD_SIZE"
        
        # Alert if build is larger than 5MB
        SIZE_BYTES=$(du -sb build | cut -f1)
        if [ $SIZE_BYTES -gt 5242880 ]; then
          echo "⚠️ Warning: Build size exceeds 5MB"
        fi
